# kmerdet Benchmarking Configuration
#
# This file controls all benchmark runs: which datasets to use, which
# parameter sweeps to run, where to find ground truth, and where to put
# output. Edit this file before running run_benchmarks.sh.
#
# Usage:
#   bash run_benchmarks.sh --config benchmark_config.toml --output-dir /tmp/bench


# ---------------------------------------------------------------------------
# Global settings
# ---------------------------------------------------------------------------

[global]

# Path to the kmerdet binary. "kmerdet" assumes it is on $PATH.
# Override with an absolute path when testing a specific build.
kmerdet_binary = "kmerdet"

# Reference km/kmtools binary for head-to-head comparison.
# Set to "" to skip km comparison benchmarks.
km_binary = "km"
kmtools_binary = "kmtools"

# Number of threads to use for detection.
# 0 = use all available cores.
threads = 4

# Number of repetitions for timing measurements (each run is timed and the
# median is reported). Minimum 1; recommend 3 for publication-quality numbers.
timing_reps = 3

# Whether to run hyperfine for timing (more accurate) or fall back to
# /usr/bin/time. hyperfine must be on $PATH for this to work.
use_hyperfine = true

# Output format for kmerdet results ("tsv" or "json").
output_format = "tsv"

# VAF bin boundaries used for per-bin sensitivity breakdown (ultra-fine).
# Extends into the sub-0.1% regime for sensitivity-first analysis.
vaf_bins = [0.0, 0.000001, 0.00001, 0.0001, 0.001, 0.01, 0.1, 0.5, 1.0]

# Standard bins for backward compatibility with thesis analysis.
vaf_bins_standard = [0.0, 0.001, 0.01, 0.05, 0.1, 0.5, 1.0]

# VAF threshold sweep values for ROC-like sensitivity/specificity curves.
# At each threshold, calls with rVAF < threshold are excluded.
sweep_vaf_thresholds = [
    0.0, 0.0001, 0.0005, 0.001, 0.002, 0.005, 0.01,
    0.02, 0.05, 0.1, 0.2, 0.5,
]


# ---------------------------------------------------------------------------
# Datasets
# ---------------------------------------------------------------------------
#
# Each [[dataset]] section defines one benchmark dataset.
# Fields:
#   name          - Short identifier used in output filenames.
#   description   - Human-readable description.
#   type          - "real" | "simulated" | "dilution_series"
#   enabled       - Set to false to skip this dataset by default.
#
# For "real" datasets:
#   jf_db         - Path to jellyfish database (.jf file).
#   targets_dir   - Directory containing target FASTA files.
#   truth_tsv     - Ground truth TSV (chrom, pos, ref, alt, type, true_vaf[, category]).
#   sample_name   - Sample identifier inserted into kmerdet output.
#
# For "simulated" datasets (generated by generate_simulated.py):
#   data_dir      - Directory containing the generated mock data.
#   truth_tsv     - Auto-generated ground truth file in data_dir.
#
# For "dilution_series" datasets:
#   base_jf_db         - 100% tumor jellyfish database.
#   normal_jf_db       - 0% tumor (normal) jellyfish database.
#   targets_dir        - Target FASTA files.
#   truth_tsv          - Truth file (true_vaf set to 1.0 for all variants).
#   dilution_fractions - VAF fractions to simulate by mixing counts.

[[dataset]]
name = "simulated_snv_indel"
description = """
Simulated dataset with known SNVs, insertions, deletions, and ITDs at
various VAF levels (0.05% - 50%). Generated by generate_simulated.py.
Used for quick accuracy regression tests.
"""
type = "simulated"
enabled = true
data_dir = "data/simulated/snv_indel"
truth_tsv = "data/simulated/snv_indel/ground_truth.tsv"
# k-mer length used when generating the mock database
kmer_length = 31

[[dataset]]
name = "simulated_large_indels"
description = """
Simulated dataset focused on large INDELs (5-50 bp) and ITDs to stress-test
INDEL sensitivity. Uses k=21 for per-target k optimization comparison.
"""
type = "simulated"
enabled = true
data_dir = "data/simulated/large_indels"
truth_tsv = "data/simulated/large_indels/ground_truth.tsv"
kmer_length = 21

[[dataset]]
name = "simulated_ultra_low_vaf"
description = """
Simulated dataset with variants at ultra-low VAF (0.01% - 0.1%) to probe
the detection threshold. Requires high simulated coverage (>= 5000x).
"""
type = "simulated"
enabled = true
data_dir = "data/simulated/ultra_low_vaf"
truth_tsv = "data/simulated/ultra_low_vaf/ground_truth.tsv"
kmer_length = 31

# Example real dataset (disabled until data is available)
[[dataset]]
name = "patient_cohort_10"
description = """
Real validation cohort: 10 patients with UMI-based duplex sequencing.
Tumor-informed panels; 50 targets per patient. Ground truth from primary
tumor WGS/targeted sequencing. Matches the thesis validation study.
"""
type = "real"
enabled = false
jf_db = "data/real/patient_cohort_10/merged.jf"
targets_dir = "data/real/patient_cohort_10/targets/"
truth_tsv = "data/real/patient_cohort_10/ground_truth.tsv"
sample_name = "cohort_10"

# Example dilution series dataset (disabled until data is available)
[[dataset]]
name = "dilution_series_snv"
description = """
Serially diluted tumor DNA in normal cfDNA background. Used to characterize
LOD (limit of detection) as a function of VAF for SNVs specifically.
Dilutions: 10%, 5%, 2%, 1%, 0.5%, 0.2%, 0.1%, 0.05%.
"""
type = "dilution_series"
enabled = false
base_jf_db = "data/real/dilution_series/tumor_100pct.jf"
normal_jf_db = "data/real/dilution_series/normal.jf"
targets_dir = "data/real/dilution_series/targets/"
truth_tsv = "data/real/dilution_series/ground_truth.tsv"
dilution_fractions = [0.10, 0.05, 0.02, 0.01, 0.005, 0.002, 0.001, 0.0005]

# --- Sensitivity-first benchmark datasets ---

[[dataset]]
name = "vaf_titration_standard"
description = """
Baseline sensitivity curve: 160 variants (10 SNV + 5 ins + 5 del per level)
across 8 VAF levels from 0.05% to 10%. Coverage 3000x.
"""
type = "simulated"
enabled = true
data_dir = "data/benchmark/vaf_titration_standard"
truth_tsv = "data/benchmark/vaf_titration_standard/ground_truth.tsv"
kmer_length = 31

[[dataset]]
name = "vaf_titration_ultra_low"
description = """
Ultra-low VAF frontier: 280 variants (20 SNV + 10 ins + 10 del per level)
across 7 VAF levels from 0.0001% to 0.1%. Coverage 50000x.
"""
type = "simulated"
enabled = true
data_dir = "data/benchmark/vaf_titration_ultra_low"
truth_tsv = "data/benchmark/vaf_titration_ultra_low/ground_truth.tsv"
kmer_length = 31

[[dataset]]
name = "vaf_titration_extreme"
description = """
Extreme VAF regime: 300 variants (50 SNV + 25 ins + 25 del per level)
at 0.001%/0.0005%/0.0001% VAF. Generated at 100000x and 500000x.
"""
type = "simulated"
enabled = true
data_dir = "data/benchmark/vaf_titration_extreme_100000x"
truth_tsv = "data/benchmark/vaf_titration_extreme_100000x/ground_truth.tsv"
kmer_length = 31

[[dataset]]
name = "coverage_vaf_matrix"
description = """
Coverage x VAF interaction matrix: 600 variants (20 SNV + 10 ins + 10 del)
at 4 VAF levels (0.1%/0.01%/0.001%/0.0001%) across 5 coverage depths
(1000x/3000x/10000x/50000x/100000x).
"""
type = "simulated"
enabled = true
data_dir = "data/benchmark/coverage_vaf_matrix_3000x"
truth_tsv = "data/benchmark/coverage_vaf_matrix_3000x/ground_truth.tsv"
kmer_length = 31

[[dataset]]
name = "indel_size_sensitivity"
description = """
INDEL size vs detection sensitivity: 800 variants (10 ins + 10 del per size)
at 10 INDEL sizes (1-50bp), 2 VAF levels (1%/0.1%), and 2 k-mer lengths
(k=21/k=31). Coverage 3000x.
"""
type = "simulated"
enabled = true
data_dir = "data/benchmark/indel_size_sensitivity_size1_k21"
truth_tsv = "data/benchmark/indel_size_sensitivity_size1_k21/ground_truth.tsv"
kmer_length = 21

[[dataset]]
name = "parameter_sensitivity"
description = """
Threshold optimization dataset: 100 variants (50 SNV + 25 ins + 25 del)
at fixed 0.05% VAF. Coverage 10000x. Used to sweep count/ratio parameters.
"""
type = "simulated"
enabled = true
data_dir = "data/benchmark/parameter_sensitivity"
truth_tsv = "data/benchmark/parameter_sensitivity/ground_truth.tsv"
kmer_length = 31


# ---------------------------------------------------------------------------
# Parameter sweep configurations
# ---------------------------------------------------------------------------
#
# These define the grid of (count, ratio) parameter combinations that will
# be tested for each dataset. Results are compared to find the Pareto-optimal
# trade-off between sensitivity and specificity.
#
# The "default" sweep uses the thesis-validated liquid biopsy parameters.
# The "grid" sweep is exhaustive for publication-quality analysis.

[param_sweep.default]
description = "Thesis-default liquid biopsy parameters (count=2, ratio=0.00001)"
count = [2]
ratio = [0.00001]

[param_sweep.liquid_biopsy_grid]
description = """
Grid search over count and ratio values recommended in the thesis for
different coverage depths. Runs all combinations.
"""
count = [1, 2, 3, 5, 10]
ratio = [0.000001, 0.00001, 0.0001, 0.001, 0.01]

[param_sweep.kmer_length]
description = """
Compare k=21, k=25, k=31 (kmerdet per-target k feature vs fixed k).
All use count=2, ratio=0.00001.
"""
kmer_lengths = [21, 25, 31]
count = [2]
ratio = [0.00001]

[param_sweep.multi_k]
description = """
Test multi-k mode: run with k=21 and k=31 and merge results.
Only applicable when kmerdet multi-k feature is implemented.
"""
kmer_lengths = [[21, 31]]   # list of lists: each inner list is one multi-k run
count = [2]
ratio = [0.00001]

[param_sweep.ultra_sensitive]
description = """
Ultra-sensitive parameters for sensitivity-first benchmarking.
count=1 accepts single-observation k-mers; ratio=0.000001 lowers the
extension threshold to detect variants at extremely low VAF.
"""
count = [1]
ratio = [0.000001]


# ---------------------------------------------------------------------------
# Performance benchmark settings
# ---------------------------------------------------------------------------

[performance]

# Target counts to test for scaling benchmarks.
# kmerdet is run with N randomly sampled targets from the dataset.
target_counts = [1, 5, 10, 25, 50, 100, 200]

# Thread counts to test for parallelism benchmarks.
thread_counts = [1, 2, 4, 8, 16]

# Whether to measure peak RSS memory (requires /usr/bin/time -v or valgrind).
measure_memory = true

# Whether to run memory profiling with valgrind massif (slow, optional).
run_valgrind = false

# Number of warmup runs before timing (discarded from statistics).
# Warmup fills OS page cache and JIT caches.
warmup_runs = 1

# Minimum acceptable throughput in targets/second. If kmerdet falls below
# this on the 50-target simulated dataset, the CI benchmark will flag it
# as a regression.
min_throughput_targets_per_sec = 0.5


# ---------------------------------------------------------------------------
# km vs kmerdet comparison settings
# ---------------------------------------------------------------------------

[comparison]

# Enable head-to-head km comparison when running benchmarks.
# Requires km binary to be available (see global.km_binary).
enabled = false

# Path to km binary. Set to the installed km command.
# km is the Python k-mer variant detection tool this project reimplements.
km_binary = "km"

# Parameter sets for comparison runs.
# Each set runs both km and kmerdet with identical parameters.
# Format: list of {count, ratio} tables.
[[comparison.param_sets]]
label = "liquid_biopsy_default"
count = 2
ratio = 0.05

[[comparison.param_sets]]
label = "sensitive"
count = 2
ratio = 0.00001

[[comparison.param_sets]]
label = "conservative"
count = 5
ratio = 0.05

# Whether to run McNemar's test for statistical significance.
run_mcnemar = true

# Whether to generate the comparison report markdown.
generate_report = true

# Whether to generate comparison plots (requires matplotlib).
generate_plots = true


# ---------------------------------------------------------------------------
# Output configuration
# ---------------------------------------------------------------------------

[output]

# Root directory for all benchmark outputs.
# Can be overridden with --output-dir on the command line.
output_dir = "results/latest"

# Whether to keep raw kmerdet TSV output files (can be large).
keep_raw_output = true

# Whether to save intermediate files (hyperfine JSON, /usr/bin/time output).
keep_intermediate = false

# Compression for large output files ("none", "gzip", "zstd").
compress_raw_output = "none"

# Name prefix for all output files in a run.
# Default: auto-generated from date + git short hash.
# run_name = "20240115-abc1234"
